<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary Professional Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h2 { margin: 0 0 10px 0; color: #00f2ff; }
        p { opacity: 0.8; font-size: 0.9em; }

        .btn {
            display: block;
            background: linear-gradient(45deg, #00f2ff, #0077ff);
            color: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Dvary Hub</h2>
            <p>IT Solutions & Cyber Tools</p>
        </div>

        <div class="card">
            <h3>Quick Access</h3>
            <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn">WhatsApp Channel</a>
            <a href="https://store.pesapal.com/lipiaapa" class="btn">Premium Services</a>
            <a href="#" class="btn">Cyber Toolbox</a>
        </div>
    </div>

</body>
</html>
