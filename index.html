<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dvary Followers Boost</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

.code-box{
    background:#111827;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🚀 Followers Boost Service</h1>

<div class="card">
<h2>1️⃣ Chagua Huduma</h2>

<select id="service">
<option>Instagram Followers</option>
<option>TikTok Followers</option>
<option>Facebook Followers</option>
<option>YouTube Subscribers</option>
<option>Telegram Members</option>
</select>

<input type="number" id="amount"
placeholder="Weka kiwango mfano 1000">

<button onclick="goPay()">ENTER</button>
</div>

<div class="card">
<h2>2️⃣ Malipo</h2>

<p>Bonyeza hapa kulipia huduma:</p>

<a href="https://store.pesapal.com/lipiaapa" target="_blank">
<button>💳 LIPA SASA</button>
</a>
</div>

<div class="card">

<h2>3️⃣ Generate Code</h2>

<button onclick="generateCode()">Generate Code</button>

<div class="code-box" id="generatedCode">
Code itaonekana hapa
</div>

</div>

<div class="card">

<h2>4️⃣ Weka Code</h2>

<input type="text" id="userCode"
placeholder="Ingiza code yako">

<button onclick="verifyCode()">
Thibitisha
</button>

<div id="result"></div>

</div>

<div class="card">
<h2>🎁 Vidude vya Juu</h2>

<button onclick="generateCode()">
🎟️ Chukua Code
</button>

<button onclick="generateCode()">
🎫 Generate Code
</button>

<button onclick="generateCode()">
🔑 Activate Code
</button>
</div>

<!-- Sehemu ya Maoni -->
<div class="card">
<h2>💬 Maoni ya Wateja</h2>

<iframe
src="https://www5.cbox.ws/box/?boxid=963994&boxtag=QmGsRp"
width="100%"
height="450"
allowtransparency="yes"
allow="autoplay"
frameborder="0"
marginheight="0"
marginwidth="0"
scrolling="auto">
</iframe>

</div>

<script>

let currentCode = "";

function goPay(){
    alert("Endelea kulipa kupitia Pesapal.");
}

function generateCode(){

    currentCode =
    "DVARY" +
    Math.floor(Math.random()*99999);

    document.getElementById("generatedCode")
    .innerHTML = currentCode;
}

function verifyCode(){

    let user =
    document.getElementById("userCode").value;

    if(user === currentCode){

        document.getElementById("result")
        .innerHTML = `
        <h3>✅ Malipo Yamethibitishwa</h3>
        <p>Wasiliana na:</p>
        <h2>+255 724 525 910</h2>
        <p>Tuma code yako pamoja na link ya account.</p>
        `;

    }else{

        document.getElementById("result")
        .innerHTML =
        "❌ Code si sahihi.";

    }
}

</script>

</body>
</html>
