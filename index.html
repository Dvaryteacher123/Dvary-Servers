<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVARY SUPER HUB</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
transition:0.3s;
}

.light{
background:#ffffff;
color:#000;
}

.header{
text-align:center;
padding:20px;
background:#111827;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #00ff99;
animation:spin 7s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.card{
background:#1e293b;
margin:15px;
padding:15px;
border-radius:12px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.green{background:#00ff99;}
.blue{background:#3b82f6;color:white;}
.orange{background:#f59e0b;color:black;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

.top3{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<img src="https://i.imgur.com/3ZQ3ZQF.png" class="profile">

<h2>🚀 DVARY SUPER HUB</h2>

<p>👀 Visitors: <span id="visitors"></span></p>

<div class="top3">
<button class="green">🚀 Boost</button>
<button class="blue">🎬 Movies</button>
<button class="orange">📢 Channel</button>
</div>

</div>

<!-- SEARCH -->
<div class="card">
<h3>🔍 Search System</h3>
<input type="text" placeholder="Search services, movies...">
</div>

<!-- BOOST -->
<div class="card">
<h3>🚀 Followers Boost</h3>

<select>
<option>Instagram Followers</option>
<option>TikTok Followers</option>
<option>Facebook Followers</option>
<option>YouTube Subscribers</option>
<option>Telegram Members</option>
<option>Instagram Likes</option>
<option>Views Boost</option>
</select>

<input type="number" placeholder="Weka kiasi (e.g 1000)">

<button class="green">Order Now</button>
</div>

<!-- MOVIES -->
<div class="card">
<h3>🎬 Movie Center</h3>

<button class="blue">🔥 Trending Movies</button>
<button class="blue">💥 Action Movies</button>
<button class="blue">😂 Comedy Movies</button>
<button class="blue">🎥 Series</button>

<p>🔒 VIP Movies zinahitaji malipo</p>

<a href="https://store.pesapal.com/lipiaapa" target="_blank">
<button class="green">💳 LIPIA VIP MOVIES</button>
</a>
</div>

<!-- LANGUAGE -->
<div class="card">
<h3>🌍 Change Language</h3>
<select onchange="changeLang(this.value)">
<option value="sw">Kiswahili</option>
<option value="en">English</option>
<option value="fr">French</option>
<option value="ar">Arabic</option>
</select>
</div>

<!-- THEME -->
<div class="card">
<h3>🌙 Theme</h3>
<button class="blue" onclick="toggleTheme()">Change Theme</button>
</div>

<!-- WHATSAPP CHANNEL -->
<div class="card">
<h3>📢 WhatsApp Channel</h3>

<a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" target="_blank">
<button class="orange">View Channel</button>
</a>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💳 Payment Section</h3>
<p>Baada ya kulipa bonyeza NIMELIPA</p>

<a href="https://store.pesapal.com/lipiaapa" target="_blank">
<button class="green">💳 LIPIA SASA</button>
</a>

<button class="blue">✅ NIMELIPA</button>

<p>📞 Contact: +255 724 525 910</p>
</div>

<!-- COMMENTS -->
<div class="card">
<h3>💬 Maoni ya Wateja</h3>

<iframe src="https://www5.cbox.ws/box/?boxid=963994&boxtag=QmGsRp"
width="100%" height="450"
frameborder="0"></iframe>

</div>

<!-- SCRIPT -->
<script>

// visitors counter
let v = localStorage.getItem("visitors") || 0;
v++;
localStorage.setItem("visitors", v);
document.getElementById("visitors").innerText = v;

// theme toggle
function toggleTheme(){
document.body.classList.toggle("light");
}

// language change
function changeLang(lang){
alert("Language changed to: " + lang);
}

</script>

</body>
</html>
